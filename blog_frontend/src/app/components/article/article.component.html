<app-header></app-header>

<section id="articleSection1" class="min-h-screen p-6 bg-slate-800">
    <div class="container mx-auto">
      <h2 class="mb-6 text-3xl font-bold text-white">Articles</h2>
      <ul class="mb-8 space-y-4">
        <li *ngFor="let article of articles" class="p-6 bg-white rounded-lg shadow">
          <h3 class="mb-2 text-2xl font-semibold">{{ article.title }}</h3>
          <p class="mb-4 text-gray-700">{{ article.content }}</p>
          <small class="text-gray-500">{{ article.created_at | date }}</small>
        </li>
      </ul>
  
      <h2 class="mb-6 text-2xl font-bold text-white">Create new Article</h2>
      <form (ngSubmit)="createArticle()" class="p-6 space-y-4 bg-white rounded-lg shadow">
        <div>
          <label for="title" class="block mb-2 font-semibold text-gray-700">Title</label>
          <input type="text" id="title" [(ngModel)]="newArticle.title" name="title" required class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div>
          <label for="content" class="block mb-2 font-semibold text-gray-700">Content</label>
          <textarea id="content" [(ngModel)]="newArticle.content" name="content" required class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
      
        <button type="submit" class="w-full py-3 font-semibold text-white transition duration-300 bg-blue-500 rounded-lg hover:bg-blue-600">Create</button>
      </form>
    </div>
</section>

<app-footer></app-footer>
