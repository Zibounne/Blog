<a href="/welcome" id="signInSection1BackHome">
    <i class="fa-solid fa-arrow-left"></i>
</a>

<section id="signInSection1">
    <div id="signInSection1Container">
      <h1>Sign In</h1>
      <form [formGroup]="signInForm" (ngSubmit)="signIn()">
        <div>
          <label for="username">Username</label>
          <input formControlName="username" type="username" id="username" placeholder="username" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input formControlName="password" type="password" id="password" placeholder="password" required>
        </div>
        <button type="submit">Sign In</button>
      </form>
      <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>
      <p *ngIf="successMessage" class="success-message">{{ successMessage }}</p>
      <p>
        Don't have an account ? <a href="/sign-up">Sign Up</a>
      </p>
    </div>
</section>
