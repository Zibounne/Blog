<a href="/" id="signUpSection1BackHome">
    <i class="fa-solid fa-arrow-left"></i>
</a>

<section id="signUpSection1">
    <div id="signUpSection1Container">
      <h1>Sign Up</h1>
      <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()">
        <div>
          <label for="username">Username</label>
          <input type="username" id="username" formControlName="username" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" formControlName="email" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" id="password" formControlName="password" required>
        </div>
        <div>
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" formControlName="confirmPassword" required>
        </div>
        <button type="submit">Sign Up</button>
      </form>
      <p *ngIf="successMessage" class="success-message">{{ successMessage }}</p>
      <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>
      <p>
        Already have an account ? <a href="/sign-in">Sign In</a>
      </p>
    </div>
</section>
