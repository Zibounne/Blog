<a href="/welcome" id="signUpSection1BackHome">
    <i class="fa-solid fa-arrow-left"></i>
</a>

<section id="signUpSection1">
    <div id="signUpSection1Container">
      <h1>Sign Up</h1>
      <form [formGroup]="signUpForm" (ngSubmit)="signUp()">
        <div>
          <label for="username">Username</label>
          <input formControlName="username" type="username" id="username" placeholder="username" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input formControlName="email" type="email" id="email" placeholder="email" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input formControlName="password" type="password" id="password" placeholder="password" required>
        </div>
        <div>
          <label for="confirm-password">Confirm Password</label>
          <input formControlName="confirmPassword" type="password" id="confirm-password" placeholder="confirm Password" required>
        </div>
        <button type="submit">Sign Up</button>
      </form>
      <p *ngIf="successMessage" class="success-message">{{ successMessage }}</p>
      <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>
      <p>
        Already have an account ? <a href="/sign-in">Sign In</a>
      </p>
    </div>
</section>
