<app-header></app-header>

<section id="profileEditSection1">
    <div id="profileEditSection1Container">
        <div id="profileEditSection1Content">
            <h1>Edit Profile</h1>
            <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
                <div>
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" formControlName="first_name"/>
                    <div *ngIf="profileForm.get('first_name')?.invalid && profileForm.get('first_name')?.touched">
                        First name is required, must be alphabetic and cannot exceed 16 characters.
                    </div>
                </div>
                <div>
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" formControlName="last_name"/>
                    <div *ngIf="profileForm.get('last_name')?.invalid && profileForm.get('last_name')?.touched">
                        Last name is required, must be alphabetic and cannot exceed 16 characters.
                    </div>
                </div>
                <div>
                    <label for="username">Username</label>
                    <input type="text" id="username" formControlName="username"/>
                    <div *ngIf="profileForm.get('username')?.invalid && profileForm.get('username')?.touched">
                        Username is required, must be at least 2 characters and cannot exceed 16 characters.
                    </div>
                </div>
                <button type="submit">Save Changes</button>
            </form>
            <p *ngIf="errorMessage" class="text-red-500 error-message">{{ errorMessage }}</p>
            <p *ngIf="successMessage" class="text-green-500 success-message">{{ successMessage }}</p>
        </div>
    </div>
</section>

<app-footer></app-footer>
